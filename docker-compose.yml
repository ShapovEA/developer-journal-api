services:
  postgres:
    image: postgres:16-alpine
    container_name: developer-journal-db
    restart: unless-stopped
    ports:
      - '15432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: developer_journal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d developer_journal']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
